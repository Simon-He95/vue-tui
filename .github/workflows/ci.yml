name: CI

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      benchmark:
        description: Run the benchmark suite instead of regular verification
        required: false
        default: false
        type: boolean
  schedule:
    - cron: "17 18 * * *"

jobs:
  verify:
    if: ${{ github.event_name != 'schedule' && github.event.inputs.benchmark != 'true' }}
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm run check:hidden-unicode

      - run: pnpm run check:tracked-build-output

      - run: pnpm run typecheck

      - run: pnpm run lint

      - run: pnpm run format:check

      - run: pnpm run test:unit

      - run: pnpm run test:coverage:core

      # Deterministic smoke bench: behavior thresholds only, no runner-timing gate.
      - run: pnpm run bench:scroll-mailbox

      - run: pnpm run docs:build

      - run: git diff --exit-code -- docs/generated

      - run: pnpm run api:diff

      - run: pnpm run build:checked

      - run: pnpm run check:dist-dts

      - run: pnpm run test:types:dist

      - run: pnpm run test:package-exports:dist

      - run: pnpm run test:browser-vite-import:dist

      - run: pnpm exec playwright install --with-deps chromium firefox webkit

      - run: pnpm run e2e:smoke

      - run: pnpm run e2e:browser-regressions

  benchmark:
    if: ${{ github.event_name == 'schedule' || github.event.inputs.benchmark == 'true' }}
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm run bench:baseline

      - name: Timing baseline
        if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.benchmark == 'true' }}
        run: pnpm run bench:baseline:timing
