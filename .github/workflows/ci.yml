name: CI

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      benchmark:
        description: Run the benchmark suite instead of regular verification
        required: false
        default: false
        type: boolean
  schedule:
    - cron: "17 18 * * *"

jobs:
  verify:
    if: ${{ github.event_name != 'schedule' && github.event.inputs.benchmark != 'true' }}
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - uses: oven-sh/setup-bun@v2

      - run: pnpm install --frozen-lockfile

      - run: pnpm run check:hidden-unicode

      - run: pnpm run check:tracked-build-output

      - run: pnpm run typecheck

      - run: pnpm run lint

      - run: pnpm run format:check

      - run: pnpm run test:unit

      # Deterministic behavior budgets only; timing budgets stay out of PR CI.
      - run: pnpm run bench:baseline

      - run: pnpm run docs:build

      - run: git diff --exit-code docs/generated/components-api.md

      - run: pnpm run build

      - run: pnpm run test:package-exports

      - run: pnpm exec playwright install --with-deps chromium

      - run: pnpm run e2e:smoke

  benchmark:
    if: ${{ github.event_name == 'schedule' || github.event.inputs.benchmark == 'true' }}
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm run bench:baseline

      - name: Timing baseline
        if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.benchmark == 'true' }}
        run: pnpm run bench:baseline:timing
