name: Release

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: Run verification without publishing
        required: false
        default: true
        type: boolean

permissions:
  contents: read

concurrency:
  group: npm-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm run release:dry-run

      - run: pnpm run release:pack

      - name: Record tarball digest
        run: |
          cd .release
          sha256sum *.tgz | tee SHA256SUMS

      - run: node scripts/smoke-packed-browser-vite.mjs .release/*.tgz

      - uses: actions/upload-artifact@v4
        with:
          name: package-tarball
          path: |
            .release/*.tgz
            .release/SHA256SUMS
          include-hidden-files: true
          if-no-files-found: error

  runtime-compat:
    needs: verify
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: ["16.17.1", "18", "20", "22", "24"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}

      - uses: actions/download-artifact@v4
        with:
          name: package-tarball
          path: package

      - run: |
          TARBALL=$(ls package/*.tgz | head -n 1)
          node scripts/smoke-packed-runtime.mjs "$TARBALL"

  publish:
    needs: [verify, runtime-compat]
    if: ${{ github.ref == 'refs/heads/main' && inputs.dry_run == false }}
    runs-on: ubuntu-latest
    environment: npm-production
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      - name: Guard publish ref
        run: test "${GITHUB_REF}" = "refs/heads/main"

      - uses: actions/download-artifact@v4
        with:
          name: package-tarball
          path: package

      - name: Verify tarball digest
        run: |
          cd package
          sha256sum -c SHA256SUMS

      - name: Check version is not already published
        run: |
          TARBALL=$(ls package/*.tgz | head -n 1)
          TMP=$(mktemp -d)
          tar -xzf "$TARBALL" -C "$TMP"
          VERSION=$(node -p "require('$TMP/package/package.json').version")
          NAME=$(node -p "require('$TMP/package/package.json').name")
          if npm view "$NAME@$VERSION" version >/dev/null 2>&1; then
            echo "$NAME@$VERSION already exists on npm"
            exit 1
          fi

      - name: Publish validated tarball
        run: |
          TARBALL=$(ls package/*.tgz | head -n 1)
          npm publish "$TARBALL" --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
