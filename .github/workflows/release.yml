name: Release

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: Run verification without publishing
        required: false
        default: true
        type: boolean

permissions:
  contents: read
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Verify release
        if: ${{ inputs.dry_run }}
        run: pnpm run release:dry-run

      - name: Guard publish ref
        if: ${{ !inputs.dry_run }}
        run: test "${GITHUB_REF}" = "refs/heads/main"

      - name: Check version is not already published
        if: ${{ !inputs.dry_run }}
        run: |
          VERSION=$(node -p "require('./package.json').version")
          NAME=$(node -p "require('./package.json').name")
          if npm view "$NAME@$VERSION" version >/dev/null 2>&1; then
            echo "$NAME@$VERSION already exists on npm"
            exit 1
          fi

      - name: Publish release
        if: ${{ !inputs.dry_run }}
        run: pnpm run release:ci
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
