name: Release

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: Run verification without publishing
        required: false
        default: true
        type: boolean
      npm_tag:
        description: npm dist-tag for dry-run and publish
        required: false
        default: rc
        type: string

permissions:
  contents: read

concurrency:
  group: npm-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  verify:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    env:
      HAS_NPM_TOKEN: ${{ secrets.NPM_TOKEN != '' }}
      NPM_TAG: ${{ inputs.npm_tag }}

    steps:
      - uses: actions/checkout@v4

      - name: Require npm token for real publish
        if: ${{ inputs.dry_run == false && env.HAS_NPM_TOKEN != 'true' }}
        run: |
          echo "NPM_TOKEN is required when dry_run=false"
          exit 1

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - run: pnpm install --frozen-lockfile

      - run: pnpm run release:check

      - run: pnpm run release:bench

      - run: pnpm run release:smoke

      - run: pnpm run release:pack

      - run: pnpm run test:package-contract:existing

      - run: pnpm run release:pack-smoke:existing

      - run: node scripts/smoke-packed-types.mjs .release/*.tgz 3.3.0

      - run: node scripts/smoke-packed-types.mjs .release/*.tgz 3.5.33

      - name: Record tarball digest
        run: |
          cd .release
          sha256sum *.tgz | tee SHA256SUMS

      - name: Validate npm dist-tag
        run: |
          TARBALL=$(ls .release/*.tgz | head -n 1)
          TMP=$(mktemp -d)
          tar -xzf "$TARBALL" -C "$TMP"
          VERSION=$(node -p "require('$TMP/package/package.json').version")
          if [ -z "${NPM_TAG:-}" ]; then
            echo "npm_tag workflow input is required"
            exit 1
          fi
          case "$NPM_TAG" in
            next|rc|beta|latest) ;;
            *)
              echo "npm_tag must be one of: next, rc, beta, latest"
              exit 1
              ;;
          esac
          if [[ "$VERSION" == *-* && "$NPM_TAG" == "latest" ]]; then
            echo "Prerelease versions must not be published with latest dist-tag"
            exit 1
          fi
          if [[ "$VERSION" != *-* && "$NPM_TAG" != "latest" ]]; then
            echo "Stable versions should use latest dist-tag"
            exit 1
          fi
          echo "Validated npm dist-tag '$NPM_TAG' for $VERSION"

      - run: pnpm exec playwright install --with-deps chromium

      - run: node scripts/smoke-packed-browser-vite.mjs .release/*.tgz 3.3.0

      - run: node scripts/smoke-packed-browser-vite.mjs .release/*.tgz 3.5.33

      - name: Dry-run npm publish from validated tarball
        if: ${{ env.HAS_NPM_TOKEN == 'true' }}
        run: |
          TARBALL=$(ls .release/*.tgz | head -n 1)
          npm publish "$TARBALL" --access public --dry-run --provenance --tag "$NPM_TAG"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          VUE_TUI_ALLOW_DIRECT_PUBLISH: "1"

      - name: Skip authenticated npm dry-run
        if: ${{ env.HAS_NPM_TOKEN != 'true' }}
        run: |
          echo "NPM_TOKEN is not configured; skipping authenticated npm publish --dry-run."
          echo "Tarball pack, checksum, browser smoke, and runtime smoke still ran."

      - uses: actions/upload-artifact@v4
        with:
          name: package-tarball
          path: |
            .release/*.tgz
            .release/SHA256SUMS
          include-hidden-files: true
          if-no-files-found: error

  runtime-compat:
    needs: verify
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: ["16.17.1", "18", "20", "22", "24"]
        vue: ["3.3.0", "3.5.33"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}

      - uses: actions/download-artifact@v4
        with:
          name: package-tarball
          path: package

      - run: |
          TARBALL=$(ls package/*.tgz | head -n 1)
          node scripts/smoke-packed-runtime.mjs "$TARBALL" "${{ matrix.vue }}"

  publish:
    needs: [verify, runtime-compat]
    if: ${{ github.ref == 'refs/heads/main' && inputs.dry_run == false }}
    runs-on: ubuntu-latest
    environment: npm-production
    permissions:
      contents: read
      id-token: write
    env:
      NPM_TAG: ${{ inputs.npm_tag }}

    steps:
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      - name: Guard publish ref
        run: test "${GITHUB_REF}" = "refs/heads/main"

      - uses: actions/download-artifact@v4
        with:
          name: package-tarball
          path: package

      - name: Verify tarball digest
        run: |
          cd package
          sha256sum -c SHA256SUMS

      - name: Check package version and npm dist-tag
        run: |
          TARBALL=$(ls package/*.tgz | head -n 1)
          TMP=$(mktemp -d)
          tar -xzf "$TARBALL" -C "$TMP"
          VERSION=$(node -p "require('$TMP/package/package.json').version")
          NAME=$(node -p "require('$TMP/package/package.json').name")
          if [ -z "${NPM_TAG:-}" ]; then
            echo "npm_tag workflow input is required"
            exit 1
          fi
          case "$NPM_TAG" in
            next|rc|beta|latest) ;;
            *)
              echo "npm_tag must be one of: next, rc, beta, latest"
              exit 1
              ;;
          esac
          if [[ "$VERSION" == *-* && "$NPM_TAG" == "latest" ]]; then
            echo "Prerelease versions must not be published with latest dist-tag"
            exit 1
          fi
          if [[ "$VERSION" != *-* && "$NPM_TAG" != "latest" ]]; then
            echo "Stable versions should use latest dist-tag"
            exit 1
          fi
          if npm view "$NAME@$VERSION" version >/dev/null 2>&1; then
            echo "$NAME@$VERSION already exists on npm"
            exit 1
          fi
          echo "Validated npm dist-tag '$NPM_TAG' for $NAME@$VERSION"

      - name: Require npm token
        run: |
          if [ -z "${NODE_AUTH_TOKEN:-}" ]; then
            echo "NPM_TOKEN is required for publishing"
            exit 1
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish validated tarball
        run: |
          TARBALL=$(ls package/*.tgz | head -n 1)
          npm publish "$TARBALL" --access public --provenance --tag "$NPM_TAG"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          VUE_TUI_ALLOW_DIRECT_PUBLISH: "1"
