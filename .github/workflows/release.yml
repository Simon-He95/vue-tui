name: Release

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: Run verification without publishing
        required: false
        default: true
        type: boolean

permissions:
  contents: read
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Verify release
        if: ${{ inputs.dry_run }}
        run: pnpm run release:dry-run

      - name: Publish release
        if: ${{ !inputs.dry_run }}
        run: pnpm run release:ci
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
