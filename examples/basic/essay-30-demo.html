<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>30字小作文渲染</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: "Courier New", monospace;
        background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        padding: 20px;
      }

      .container {
        width: 100%;
        max-width: 900px;
      }

      .terminal {
        background: #0a0a0a;
        border: 3px solid #9c27b0;
        border-radius: 10px;
        padding: 20px;
        box-shadow: 0 0 30px rgba(156, 39, 176, 0.3);
      }

      .terminal-header {
        color: #9c27b0;
        font-size: 18px;
        font-weight: bold;
        margin-bottom: 20px;
        text-align: center;
        text-shadow: 0 0 10px rgba(156, 39, 176, 0.5);
      }

      .section {
        margin-bottom: 20px;
      }

      .label {
        color: #ffeb3b;
        font-size: 14px;
        margin-bottom: 8px;
      }

      .essay-display {
        background: #1a1a2e;
        border: 2px solid #e91e63;
        border-radius: 5px;
        padding: 20px;
        color: #e91e63;
        font-size: 18px;
        font-weight: bold;
        line-height: 1.8;
        text-align: center;
        min-height: 100px;
        display: flex;
        align-items: center;
        justify-content: center;
        word-break: break-word;
      }

      .char-count {
        color: #2196f3;
        font-size: 14px;
        margin-top: 10px;
        display: flex;
        justify-content: space-between;
        align-items: center;
      }

      .char-count .target {
        color: #4caf50;
      }

      .divider {
        color: #757575;
        font-size: 12px;
        margin: 20px 0;
        letter-spacing: 2px;
      }

      .input-area {
        background: #1a1a2e;
        border: 2px solid #ff9800;
        border-radius: 5px;
        padding: 15px;
      }

      textarea {
        width: 100%;
        background: #0a0a0a;
        border: 1px solid #333;
        border-radius: 3px;
        color: #fff;
        font-family: "Courier New", monospace;
        font-size: 16px;
        padding: 10px;
        resize: vertical;
        min-height: 100px;
      }

      textarea:focus {
        outline: none;
        border-color: #9c27b0;
      }

      .button-group {
        display: flex;
        gap: 10px;
        margin-top: 10px;
        flex-wrap: wrap;
      }

      button {
        background: #9c27b0;
        color: #fff;
        border: none;
        padding: 10px 20px;
        border-radius: 5px;
        font-family: "Courier New", monospace;
        font-size: 14px;
        cursor: pointer;
        transition: all 0.3s;
      }

      button:hover {
        background: #7b1fa2;
        transform: translateY(-2px);
        box-shadow: 0 5px 15px rgba(156, 39, 176, 0.3);
      }

      button.secondary {
        background: #757575;
      }

      button.secondary:hover {
        background: #616161;
      }

      button.generate {
        background: #00bcd4;
      }

      button.generate:hover {
        background: #00acc1;
      }

      .tips {
        color: #e91e63;
        font-size: 12px;
        margin-top: 15px;
        line-height: 1.6;
      }

      .tips li {
        margin-bottom: 5px;
      }

      .status {
        color: #4caf50;
        font-size: 12px;
        margin-top: 15px;
      }

      .highlight {
        color: #fff;
        font-weight: bold;
      }

      /* 状态指示器 */
      .status-indicator {
        display: inline-block;
        width: 10px;
        height: 10px;
        border-radius: 50%;
        background: #4caf50;
        margin-right: 5px;
        animation: pulse 2s infinite;
      }

      @keyframes pulse {
        0%,
        100% {
          opacity: 1;
          transform: scale(1);
        }
        50% {
          opacity: 0.5;
          transform: scale(1.2);
        }
      }

      /* 字符计数进度条 */
      .progress-bar {
        width: 100%;
        height: 8px;
        background: #333;
        border-radius: 4px;
        margin-top: 5px;
        overflow: hidden;
      }

      .progress-fill {
        height: 100%;
        background: linear-gradient(90deg, #4caf50, #8bc34a);
        transition: width 0.3s;
      }

      .progress-fill.warning {
        background: linear-gradient(90deg, #ff9800, #ffc107);
      }

      .progress-fill.error {
        background: linear-gradient(90deg, #f44336, #ff5722);
      }

      /* 响应式设计 */
      @media (max-width: 600px) {
        .terminal {
          padding: 10px;
        }

        .essay-display {
          font-size: 14px;
          padding: 15px;
        }

        button {
          padding: 8px 12px;
          font-size: 12px;
        }

        .button-group {
          flex-direction: column;
        }

        button {
          width: 100%;
        }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="terminal">
        <div class="terminal-header">═══ 30字小作文生成器 ═══</div>

        <!-- 小作文显示区域 -->
        <div class="section">
          <div class="label">当前小作文：</div>
          <div class="essay-display" id="essayDisplay">
            清晨阳光洒满窗台，鸟儿枝头欢歌笑语，微风拂过绿草如茵，新的一天充满希望，梦想在心中悄然绽放
          </div>
          <div class="char-count">
            <span>字符数：<span id="charCount">30</span></span>
            <span class="target">目标：30字</span>
          </div>
          <div class="progress-bar">
            <div class="progress-fill" id="progressFill" style="width: 100%"></div>
          </div>
        </div>

        <!-- 分隔线 -->
        <div class="divider">──────────────────────────────────────────────────────</div>

        <!-- 输入区域 -->
        <div class="section">
          <div class="label">输入新的小作文：</div>
          <div class="input-area">
            <textarea id="essayInput" placeholder="请输入30字小作文...">
清晨阳光洒满窗台，鸟儿枝头欢歌笑语，微风拂过绿草如茵，新的一天充满希望，梦想在心中悄然绽放</textarea
            >
            <div class="button-group">
              <button onclick="updateEssay()">确认修改</button>
              <button class="secondary" onclick="resetEssay()">重置</button>
              <button class="generate" onclick="generateRandom()">随机生成</button>
              <button class="secondary" onclick="clearInput()">清空输入</button>
            </div>
          </div>
        </div>

        <!-- 提示信息 -->
        <div class="section">
          <div class="label">提示：</div>
          <ul class="tips">
            <li>• 最佳长度为30个字符</li>
            <li>• 支持中文字符、标点符号和数字</li>
            <li>• 点击"随机生成"获取新的30字小作文</li>
            <li>• 进度条显示字符数量达标程度</li>
          </ul>
        </div>

        <!-- 底部状态栏 -->
        <div class="status">
          <span class="status-indicator"></span>
          系统状态：<span class="highlight">就绪</span>
        </div>
      </div>
    </div>

    <script>
      // 预设的30字小作文（精确30字）
      const essays = [
        "春风拂面柳丝长，桃花满园映朝阳，燕子归来筑新巢，一派生机盎然",
        "夏日炎炎蝉鸣声，荷花盛开清香溢，绿树成荫遮阳暑，冰镇西瓜解渴",
        "秋高气爽丹桂香，枫叶满山红似火，稻谷金黄硕果累，丰收喜悦满心",
        "冬雪纷飞银装裹，梅花傲雪独自放，围炉夜话温暖春，冬日温情暖心",
        "晨曦微露鸟声脆，露珠晶莹草叶尖，日出东方红胜火，一日之计在于",
        "夕阳西下染红霞，归鸟投林影渐斜，炊烟袅袅农家乐，田园风光美如",
        "青山绿水风景画，白云悠悠蓝天阔，鸟儿欢唱鱼儿游，人与自然和谐",
        "书山有路勤为径，学海无涯苦作舟，知识海洋无穷尽，学习路上永不",
        "友情如酒越陈香，真诚相待岁月长，患难与共情义价，朋友人生宝贵",
        "爱情甜蜜如蜜糖，两情相悦意相通，相濡以沫白头老，爱情路上携手",
      ];

      // 获取DOM元素
      const essayDisplay = document.getElementById("essayDisplay");
      const essayInput = document.getElementById("essayInput");
      const charCount = document.getElementById("charCount");
      const progressFill = document.getElementById("progressFill");

      // 目标字符数
      const TARGET_CHARS = 30;

      // 更新小作文
      function updateEssay() {
        const text = essayInput.value.trim();
        if (text) {
          essayDisplay.textContent = text;
          updateCharCount(text.length);
          updateStatus("小作文已更新", true);
        } else {
          updateStatus("请输入小作文内容", false);
        }
      }

      // 重置小作文
      function resetEssay() {
        essayInput.value = essays[0];
        updateEssay();
        updateStatus("已重置为默认小作文", true);
      }

      // 随机生成小作文
      function generateRandom() {
        const randomIndex = Math.floor(Math.random() * essays.length);
        essayInput.value = essays[randomIndex];
        updateEssay();
        updateStatus("已生成随机30字小作文", true);
      }

      // 清空输入
      function clearInput() {
        essayInput.value = "";
        essayDisplay.textContent = "等待输入...";
        updateCharCount(0);
        updateStatus("输入已清空", true);
      }

      // 更新字符计数和进度条
      function updateCharCount(count) {
        charCount.textContent = count;

        // 计算进度
        const progress = Math.min((count / TARGET_CHARS) * 100, 100);
        progressFill.style.width = `${progress}%`;

        // 更新进度条颜色
        progressFill.classList.remove("warning", "error");
        if (count < TARGET_CHARS * 0.8) {
          progressFill.classList.add("error");
        } else if (count > TARGET_CHARS * 1.2) {
          progressFill.classList.add("warning");
        }
      }

      // 更新状态栏
      function updateStatus(message, success) {
        const statusElement = document.querySelector(".status");
        const color = success ? "#4caf50" : "#f44336";
        statusElement.innerHTML = `
        <span class="status-indicator" style="background: ${color}"></span>
        系统状态：<span class="highlight" style="color: ${color}">${message}</span>
      `;

        // 3秒后恢复默认状态
        setTimeout(() => {
          statusElement.innerHTML = `
          <span class="status-indicator"></span>
          系统状态：<span class="highlight">就绪</span>
        `;
        }, 3000);
      }

      // 实时更新字符数
      essayInput.addEventListener("input", function () {
        const count = this.value.length;
        updateCharCount(count);

        // 实时预览
        if (this.value.trim()) {
          essayDisplay.textContent = this.value;
        } else {
          essayDisplay.textContent = "等待输入...";
        }
      });

      // 初始化
      document.addEventListener("DOMContentLoaded", function () {
        updateCharCount(essays[0].length);
        console.log("30字小作文生成器已启动");
      });
    </script>
  </body>
</html>
